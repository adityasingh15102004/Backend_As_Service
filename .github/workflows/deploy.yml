# ============================================================
# Build & Deploy to AWS EC2 (Free Tier Optimized)
# ============================================================
name: Build & Deploy — SaaS Backend

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: ap-south-1
  EC2_INSTANCE: i-0e1879fa9f18592ce # Your existing instance ID
  APP_JAR_NAME: saas-0.0.1-SNAPSHOT.jar

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build the heavy JAR on GitHub (saves EC2 RAM)
      - name: Build JAR with Maven
        run: ./mvnw clean package -B -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: saas-backend-jar
          path: target/${{ env.APP_JAR_NAME }}

  deploy:
    name: Deploy to AWS EC2
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: saas-backend-jar
          path: .

      - name: Configure SSH Key
        run: |
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Step 1 — Copy files to EC2
        run: |
          # Send the JAR, the Dockerfile, and the Compose file
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ env.APP_JAR_NAME }} \
            Dockerfile.prod \
            docker-compose.prod.yml \
            .env.prod \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/saas-backend/

      - name: Step 2 — Run Docker Compose on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOFSCRIPT'
          cd /opt/saas-backend/
          # Ensure old container is stopped
          docker-compose -f docker-compose.prod.yml down --remove-orphans || true
          # Rebuild and start (using host network)
          docker-compose -f docker-compose.prod.yml build
          docker-compose -f docker-compose.prod.yml up -d
          # Cleanup unused images to save disk space on EC2
          docker image prune -f
          EOFSCRIPT

      - name: Step 3 — Verify Deployment Health
        run: |
          echo "Waiting for app to start (30s)..."
          sleep 30
          # Using port 8080 because the app is on the host network
          curl -f http://${{ secrets.EC2_HOST }}:8080/actuator/health || exit 1
          echo "✅ Deployment successful and healthy!"

      - name: Cleanup
        if: always()
        run: rm -f private_key.pem
