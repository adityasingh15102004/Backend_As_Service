# ============================================================
# application.yml — Base / Test Config (src/test/resources)
# Used by GitHub Actions CI: no MySQL, no mail, no external deps
# ============================================================

spring:
  config:
    import: ""   # Disable .env import in test — not available in CI

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop  # Rebuild schema for each test run
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Disable real mail sending in tests
  mail:
    host: localhost
    port: 3025
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080

application:
  security:
    jwt:
      secret-key: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      expiration: 3600000
  cors:
    default-origins: http://localhost:3000
