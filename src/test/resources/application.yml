spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  mail:
    host: localhost

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:NTM2NzU2NkI1OTcwMzM3MzM2NzYzOTc5MkY0MjNGNDUyODQ4MkI0RDZCNTE2NTU0Njg1NzZENzE3NDM3}
      expiration: 1800000
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:fake-key}
