# ============================================================
# application-prod.yml — Production Profile Overrides
# Activated when: SPRING_PROFILES_ACTIVE=prod
# (Set automatically by docker-compose.yml or deployment)
# ============================================================

server:
  port: ${PORT:8080}
  compression:
    enabled: true          # Enable gzip compression
  http2:
    enabled: true          # HTTP/2 support
  error:
    include-message: never # Don't expose error details
    include-stacktrace: never
    include-exception: false
  servlet:
    session:
      cookie:
        secure: true       # HTTPS only
        http-only: true    # No JS access
        same-site: strict  # CSRF protection

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
     ddl-auto: update
    show-sql: false
    open-in-view: false
  
  cache:
    type: simple
  
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 10000
      mail.smtp.writetimeout: 10000
      mail.smtp.ssl.trust: smtp.gmail.com

logging:
  level:
    root: WARN               # Only warnings and errors in prod
    com.jobhunt.saas: INFO   # Our code at INFO level
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: ERROR
  file:
    name: logs/app.log
    max-size: 10MB
    max-history: 10
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized  # Only for authorized users
  metrics:
    export:
      prometheus:
        enabled: true

# Prod: longer JWT expiration (24 hours)
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:vWv7z8BfG9pQ2mR5kX3nJ8uS1tV4yZ6aE0bC9dX2fG5hJ8kL1mN4pQ7rS0tV3yZ6}
      expiration: ${JWT_EXPIRATION:86400000}
  cors:

    default-origins: ${CORS_DEFAULT_ORIGINS:https://saas-frontend2-0.vercel.app/}

gemini:
  api:
    key: ${GEMINI_API_KEY:placeholder_key}

app:
  base-url: ${APP_BASE_URL:https://backendasservice-production.up.railway.app/}

email:
  token:
    expiration-hours: ${EMAIL_TOKEN_EXPIRATION:24}
