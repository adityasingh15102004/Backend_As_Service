# ============================================================
# application-prod.yml — Production Profile Overrides
# Activated when: SPRING_PROFILES_ACTIVE=prod
# (Set automatically by docker-compose.yml or deployment)
# ============================================================

server:
  port: 8080
  compression:
    enabled: true          # Enable gzip compression
  http2:
    enabled: true          # HTTP/2 support
  error:
    include-message: never # Don't expose error details
    include-stacktrace: never
    include-exception: false
  servlet:
    session:
      cookie:
        secure: true       # HTTPS only
        http-only: true    # No JS access
        same-site: strict  # CSRF protection

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER_NAME}
    password: ${DATABASE_USER_PASSWORD}
  
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
     ddl-auto: update
    show-sql: false
    open-in-view: false
  
  cache:
    type: simple
  
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

logging:
  level:
    root: WARN               # Only warnings and errors in prod
    com.jobhunt.saas: INFO   # Our code at INFO level
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: ERROR
  file:
    name: logs/app.log
    max-size: 10MB
    max-history: 10
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized  # Only for authorized users
  metrics:
    export:
      prometheus:
        enabled: true

# Prod: longer JWT expiration (24 hours)
application:
  security:
    jwt:
      expiration: ${JWT_EXPIRATION:86400000}
  cors:

    default-origins: ${CORS_DEFAULT_ORIGINS:https://saas-frontend2-0.vercel.app/}
