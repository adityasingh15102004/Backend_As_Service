server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: saas

  datasource:
    url: ${DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQL_DATABASE:railway}?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:${MYSQLUSER:root}}
    password: ${DB_PASSWORD:${MYSQLPASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.google.genai.GoogleGenAiAutoConfiguration

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}


application:
  security:
    jwt:
      # Valid Base64-encoded 256-bit key (used as fallback if JWT_SECRET is not set in Railway)
      secret-key: ${JWT_SECRET:}
      expiration: 1800000
