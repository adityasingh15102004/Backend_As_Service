server:
  port: ${PORT:${SERVER_PORT:8080}}

# spring:
#   config:
#     import: optional:file:.env.dev[.properties]
  application:
    name: Backend_As_Service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:railway}?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
    username: ${DATABASE_USER_NAME:${DATABASE_USER:root}}
    password: ${DATABASE_USER_PASSWORD:${DATABASE_PASS:}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  autoconfigure:
    exclude:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000



application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:3600000}
  cors:
    default-origins: ${CORS_DEFAULT_ORIGINS:http://localhost:3000,http://localhost:8080}

gemini:
  api:
    key: ${GEMINI_API_KEY:}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

email:
  token:
    expiration-hours: ${EMAIL_TOKEN_EXPIRATION:24}
