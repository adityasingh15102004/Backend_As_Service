server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: saas

  datasource:
    url: ${DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQL_DATABASE:railway}?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:${MYSQLUSER:root}}
    password: ${DB_PASSWORD:${MYSQLPASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  autoconfigure:
    exclude:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000



application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:}
      expiration: ${JWT_EXPIRATION:3600000}
  cors:
    default-origins: ${CORS_DEFAULT_ORIGINS:http://localhost:3000,http://localhost:8080}
